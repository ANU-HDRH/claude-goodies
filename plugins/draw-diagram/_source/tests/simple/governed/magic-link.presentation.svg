<?xml version="1.0" encoding="utf-8"?>
<!-- source-sha256: d5f42fcee3fc06821d887a18a2ca4674c8f623fbe873f0b03b025c74ca7af1b6 -->
<!--
  Presentation render of magic-link.d2 (governed tier).
  Semantics are owned by the .d2; this is a derived artifact verified by
  references/check-presentation.py. Hand-crafted sequence-diagram layout:
  the flow is an 8-step chronology, which reads best on a vertical time axis.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="720"
     viewBox="0 0 900 720" font-family="Inter, 'Helvetica Neue', Helvetica, Arial, sans-serif">

  <defs>
    <!-- soft drop shadow for cards -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.18"/>
    </filter>
    <!-- arrowheads -->
    <marker id="arrowSolid" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4f46e5"/>
    </marker>
    <marker id="arrowReturn" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <marker id="arrowWeak" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <!-- subtle gradient for the title rule -->
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="900" height="720" fill="#ffffff"/>

  <!-- ===================== title ===================== -->
  <text x="48" y="46" font-size="24" font-weight="700" fill="#0f172a">Magic-link login</text>
  <text x="48" y="68" font-size="13" fill="#64748b">How a user signs in with a one-time email link &#8212; the request path, step by step.</text>
  <rect x="48" y="80" width="380" height="3" fill="url(#rule)" rx="1.5"/>

  <!-- column geometry: user=140 app=320 api=500 mail=690 db=830 -->
  <!-- lifeline span -->
  <g stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="2 6">
    <line x1="140" y1="170" x2="140" y2="640"/>
    <line x1="320" y1="170" x2="320" y2="640"/>
    <line x1="500" y1="170" x2="500" y2="640"/>
    <line x1="690" y1="170" x2="690" y2="640"/>
    <line x1="830" y1="170" x2="830" y2="640"/>
  </g>

  <!-- ===================== nodes (lifeline heads) ===================== -->

  <!-- USER (actor figure) -->
  <g data-d2-node="user">
    <rect x="92" y="104" width="96" height="58" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="2" filter="url(#cardShadow)"/>
    <!-- little person glyph -->
    <g transform="translate(112,118)" stroke="#475569" stroke-width="2" fill="none" stroke-linecap="round">
      <circle cx="6" cy="6" r="5.5" fill="#475569" stroke="none"/>
      <path d="M-2,30 C-2,18 14,18 14,30" fill="#475569" stroke="none"/>
    </g>
    <text x="148" y="129" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">User</text>
    <text x="148" y="146" font-size="10.5" fill="#64748b" text-anchor="middle">person</text>
  </g>

  <!-- WEB APP (service) -->
  <g data-d2-node="app">
    <rect x="268" y="104" width="104" height="58" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="268" y="104" width="104" height="18" rx="8" fill="#4f46e5"/>
    <rect x="268" y="113" width="104" height="9" fill="#4f46e5"/>
    <text x="320" y="117" font-size="9.5" font-weight="700" fill="#e0e7ff" text-anchor="middle" letter-spacing="0.5">SERVICE</text>
    <text x="320" y="143" font-size="13" font-weight="700" fill="#312e81" text-anchor="middle">Web App</text>
  </g>

  <!-- AUTH API (service) -->
  <g data-d2-node="api">
    <rect x="448" y="104" width="104" height="58" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2" filter="url(#cardShadow)"/>
    <rect x="448" y="104" width="104" height="18" rx="8" fill="#4f46e5"/>
    <rect x="448" y="113" width="104" height="9" fill="#4f46e5"/>
    <text x="500" y="117" font-size="9.5" font-weight="700" fill="#e0e7ff" text-anchor="middle" letter-spacing="0.5">SERVICE</text>
    <text x="500" y="143" font-size="13" font-weight="700" fill="#312e81" text-anchor="middle">Auth API</text>
  </g>

  <!-- EMAIL PROVIDER (external, dashed) -->
  <g data-d2-node="mail">
    <rect x="640" y="104" width="100" height="58" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2" stroke-dasharray="5 4" filter="url(#cardShadow)"/>
    <text x="690" y="124" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">Email</text>
    <text x="690" y="140" font-size="13" font-weight="700" fill="#334155" text-anchor="middle">Provider</text>
    <text x="690" y="155" font-size="9.5" fill="#94a3b8" text-anchor="middle" font-style="italic">external</text>
  </g>

  <!-- TOKEN STORE (datastore cylinder) -->
  <g data-d2-node="db">
    <path d="M794,118 L794,150 A36,9 0 0 0 866,150 L866,118"
          fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
    <ellipse cx="830" cy="118" rx="36" ry="9" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="830" y="138" font-size="12" font-weight="700" fill="#78350f" text-anchor="middle">Token</text>
    <text x="830" y="152" font-size="12" font-weight="700" fill="#78350f" text-anchor="middle">Store</text>
  </g>

  <!-- ===================== edges (messages) ===================== -->
  <!-- Each message is one tagged path. Steps run top to bottom on the time axis. -->

  <!-- step 1: user -> app  (y=205) -->
  <g>
    <path data-d2-edge="user->app" d="M140,205 L316,205" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowSolid)"/>
    <circle cx="140" cy="205" r="11" fill="#4f46e5"/>
    <text x="140" y="209" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="228" y="198" font-size="12" fill="#334155" text-anchor="middle">enter email</text>
  </g>

  <!-- step 2: app -> api  (y=255) -->
  <g>
    <path data-d2-edge="app->api" d="M320,255 L496,255" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowSolid)"/>
    <circle cx="320" cy="255" r="11" fill="#4f46e5"/>
    <text x="320" y="259" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="410" y="248" font-size="12" fill="#334155" text-anchor="middle">request link</text>
  </g>

  <!-- step 3: api -> db  (y=305) -->
  <g>
    <path data-d2-edge="api->db" d="M500,305 L826,305" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowSolid)"/>
    <circle cx="500" cy="305" r="11" fill="#4f46e5"/>
    <text x="500" y="309" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="663" y="298" font-size="12" fill="#334155" text-anchor="middle">store token</text>
  </g>

  <!-- step 4: api -> mail  (weak / async, y=355) -->
  <g>
    <path data-d2-edge="api->mail" d="M500,355 L686,355" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowWeak)"/>
    <circle cx="500" cy="355" r="11" fill="#94a3b8"/>
    <text x="500" y="359" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="593" y="348" font-size="12" fill="#64748b" text-anchor="middle">send link</text>
  </g>

  <!-- separator: user receives email, clicks link -->
  <line x1="120" y1="385" x2="850" y2="385" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="485" y="382" font-size="10.5" fill="#94a3b8" text-anchor="middle" font-style="italic">&#8212; user opens email, clicks the link &#8212;</text>

  <!-- step 5: user -> app  (y=415) -->
  <g>
    <path data-d2-edge="user->app" d="M140,415 L316,415" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowSolid)"/>
    <circle cx="140" cy="415" r="11" fill="#4f46e5"/>
    <text x="140" y="419" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">5</text>
    <text x="228" y="408" font-size="12" fill="#334155" text-anchor="middle">click link</text>
  </g>

  <!-- step 6: app -> api  (y=465) -->
  <g>
    <path data-d2-edge="app->api" d="M320,465 L496,465" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowSolid)"/>
    <circle cx="320" cy="465" r="11" fill="#4f46e5"/>
    <text x="320" y="469" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">6</text>
    <text x="410" y="458" font-size="12" fill="#334155" text-anchor="middle">verify token</text>
  </g>

  <!-- step 7: api -> db  (y=515) -->
  <g>
    <path data-d2-edge="api->db" d="M500,515 L826,515" fill="none" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowSolid)"/>
    <circle cx="500" cy="515" r="11" fill="#4f46e5"/>
    <text x="500" y="519" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">7</text>
    <text x="663" y="508" font-size="12" fill="#334155" text-anchor="middle">check + consume</text>
  </g>

  <!-- step 8: api -> app  (return / session, y=575) -->
  <g>
    <path data-d2-edge="api->app" d="M500,575 L324,575" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="0" marker-end="url(#arrowReturn)"/>
    <circle cx="500" cy="575" r="11" fill="#059669"/>
    <text x="500" y="579" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">8</text>
    <text x="410" y="568" font-size="12" fill="#065f46" text-anchor="middle">issue session</text>
  </g>

  <!-- ===================== legend ===================== -->
  <g transform="translate(48,648)">
    <rect x="0" y="0" width="804" height="48" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

    <line x1="20" y1="18" x2="50" y2="18" stroke="#4f46e5" stroke-width="2" marker-end="url(#arrowSolid)"/>
    <text x="58" y="22" font-size="11.5" fill="#475569">request</text>

    <line x1="135" y1="18" x2="165" y2="18" stroke="#059669" stroke-width="2" marker-end="url(#arrowReturn)"/>
    <text x="173" y="22" font-size="11.5" fill="#475569">response</text>

    <line x1="265" y1="18" x2="295" y2="18" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowWeak)"/>
    <text x="303" y="22" font-size="11.5" fill="#475569">async / out-of-band</text>

    <rect x="20" y="32" width="14" height="10" rx="2" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="40" y="41" font-size="11.5" fill="#475569">service</text>

    <path d="M118,32 h14 v8 a7,3 0 0 1 -14,0 z" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
    <ellipse cx="125" cy="32" rx="7" ry="3" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="140" y="41" font-size="11.5" fill="#475569">datastore</text>

    <rect x="225" y="32" width="14" height="10" rx="2" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3 2"/>
    <text x="245" y="41" font-size="11.5" fill="#475569">external system</text>

    <text x="640" y="29" font-size="10" fill="#94a3b8" text-anchor="end">governed &#183; derived from magic-link.d2</text>
    <text x="640" y="42" font-size="10" fill="#94a3b8" text-anchor="end">out of scope: token rotation, rate limiting, error/abuse UX</text>
  </g>

</svg>
